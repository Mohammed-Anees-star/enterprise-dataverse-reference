name: CD — Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production ]

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_WEBAPP_NAME: enterprise-ticketing-api
  AZURE_RESOURCE_GROUP: rg-enterprise-ticketing-prod

jobs:
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://enterprise-ticketing-api-staging.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish application
        run: |
          dotnet publish src/4-API/EnterpriseTicketing.API/EnterpriseTicketing.API.csproj \
            -c Release -o ./publish \
            /p:UseAppHost=false

      - name: Deploy to Staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          package: ./publish

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
          echo "Running smoke tests against $STAGING_URL"
          curl -f "$STAGING_URL/health/live" || exit 1
          curl -f "$STAGING_URL/health/ready" || exit 1
          echo "Smoke tests passed"

  promote-to-production:
    name: Promote → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://enterprise-ticketing-api.azurewebsites.net

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging → production slots
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --slot staging \
              --target-slot production

      - name: Verify production health
        run: |
          sleep 30  # Allow slot swap to propagate
          PROD_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          curl -f "$PROD_URL/health/live" || exit 1
          echo "Production health check passed"

      - name: Notify deployment success
        if: success()
        run: |
          echo "::notice::Deployment to production succeeded. Commit: ${{ github.sha }}"
